name: Protocol Devchain Anvil
on:
  push:
    branches:
      - master
      - 'release/**'
    tags:
      - core-contracts.v*
  pull_request:
    branches: [release/core-contracts/*, master]
    paths:
      - 'packages/protocol/**'
  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'NPM TAG e.g. alpha, pre-merge (default: canary) '
        required: true
        type: string

env:
  # Increment these to force cache rebuilding
  FOUNDRY_CACHE_KEY: 1
  # TODO: Standardize Foundry version across workflows https://github.com/celo-org/celo-monorepo/issues/11714

permissions:
  contents: read

jobs:
  build:
    defaults:
      run:
        working-directory: packages/protocol
    name: Generate anvil
    runs-on: ['self-hosted', 'monorepo-node18']
    environment:
      name: production
    permissions:
      contents: read
      pull-requests: read
    outputs:
      release_type: ${{ steps.release-env.outputs.release_type }}
      release_version: ${{ steps.release-env.outputs.release_version }}
      artifact_name: ${{ steps.artifact-name.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Fail if there are test with wrong extension
        run: |
          if  tree test-sol | grep -i ".sol" | grep -v ".sol"; then
            echo "There are tests with wrong extensions"
            tree test-sol | grep -i ".sol" | grep -v ".sol"
            exit 1
          fi
      - name: Foundry cache
        id: foundry-cache
        uses: actions/cache@v4
        with:
          path: ./cache
          key: ${{ runner.os }}-foundry-cache-${{ env.FOUNDRY_CACHE_KEY }}
      - name: Foundry out
        id: foundry-out
        uses: actions/cache@v4
        with:
          path: ./out
          key: ${{ runner.os }}-foundry-out-${{ env.FOUNDRY_CACHE_KEY }}

      - name: Display SHA
        run: |
          echo "SHA: ${{ github.sha }}"

      - name: Get Pull Request data
        id: get_pr_data
        uses: actions/github-script@v7
        with:
          script: |
            const result = (
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                commit_sha: context.sha,
                owner: context.repo.owner,
                repo: context.repo.repo,
              })
            ).data[0];
            core.setOutput("number", result ? result.number : "");

      - name: Set PR Number
        id: set_pr_number
        run: |
          if [ -z "${{ steps.get_pr_data.outputs.number }}" ]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            echo "PR_NUMBER=${{ steps.get_pr_data.outputs.number }}" >> $GITHUB_ENV
          fi

      - name: Display PR Number
        run: |
          echo "Pull Request Number: ${{ env.PR_NUMBER }}"

      - name: Install Foundry
        # foundry-toolchain v1.7.0 https://github.com/foundry-rs/foundry-toolchain/releases/tag/v1.7.0
        uses: foundry-rs/foundry-toolchain@8f1998e9878d786675189ef566a2e4bf24869773
        with:
          # TODO: Standardize Foundry version across workflows https://github.com/celo-org/celo-monorepo/issues/11714
          version: 'v1.5.0'

      - name: Install forge dependencies
        run: forge install

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

#      - name: Akeyless Get Secrets
#        id: get_auth_token
#        uses: docker://us-west1-docker.pkg.dev/devopsre/akeyless-public/akeyless-action:latest
#        with:
#          api-url: https://api.gateway.akeyless.celo-networks-dev.org
#          access-id: p-kf9vjzruht6l
#          static-secrets: '{"/static-secrets/NPM/npm-publish-token":"NPM_TOKEN"}'

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: 'Setup yarn'
        shell: bash
        run: |
          npm install --global yarn
          source ~/.bashrc


      - name: 'Install packages'
        shell: bash
        run: yarn

      - name: Checkout Optimism repo
        uses: actions/checkout@v4
        if: success() || failure()
        with:
          repository: 'celo-org/optimism'
          ref: 'celo/core-contracts-base'
          path: celo-optimism
          submodules: recursive

      - name: Generate initial state for devchain
        if: success() || failure()
        run: yarn devchain:generate-initial-state --contracts-dir ${{ github.workspace }}/celo-optimism/packages/contracts-bedrock

      - name: Install celocli
        run: |
          sudo npm install -g @celo/celocli@latest --unsafe-perm
          celocli --version

      - name: Generate migrations on local devchain
        if: success() || failure()
        run: |
          LOAD_STATE=${{ github.workspace }}/celo-optimism/packages/contracts-bedrock/anvil-state.json yarn anvil-devchain:start

      - name: Run migration tests against local op-geth devchain
        run: |
          source ./scripts/foundry/constants.sh

          FOUNDRY_PROFILE=devchain forge test -vvv \
          --match-path "test-sol/devchain/migration/*" \
          --fork-url $ANVIL_RPC_URL
      
      - name: Run e2e tests against local devchain
        run: |
          source ./scripts/foundry/constants.sh

          FOUNDRY_PROFILE=devchain forge test -vvv \
          --match-path "test-sol/devchain/e2e/*" \
          --fork-url $ANVIL_RPC_URL

      - name: Sanitize ref name
        id: sanitize-ref-name
        run: |
          sanitized_ref_name=$(echo "${{ github.ref_name }}" | tr -cd '[:alnum:]-_')
          echo "sanitized_ref_name=${sanitized_ref_name}" >> $GITHUB_ENV

      - name:
          Determine release type and version (or dry run)
          # This is what sets the RELEASE_TYPE and RELEASE_VERSION env variables
        run: yarn --silent release:determine-release-version >> "$GITHUB_ENV"
        working-directory: packages/protocol
        env:
          GITHUB_TAG: ${{ github.ref_name }}
          NPM_PACKAGE: '@celo/devchain-anvil'
          NPM_TAG: ${{ inputs.npm_tag }}

      - name: Set release outputs
        id: release-env
        run: |
          echo "release_type=${{ env.RELEASE_TYPE }}" >> $GITHUB_OUTPUT
          echo "release_version=${{ env.RELEASE_VERSION }}" >> $GITHUB_OUTPUT

      - name: Prepare package for publishing
        run: yarn utils:prepare-devchain-anvil-publishing
        working-directory: packages/protocol
        env:
          RELEASE_TYPE: ${{ env.RELEASE_TYPE }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}

      - name: Set artifact name
        id: artifact-name
        run: echo "name=devchain-${{ env.PR_NUMBER }}-${{ steps.date.outputs.date }}" >> $GITHUB_OUTPUT


      - name: Upload devchain as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: packages/protocol/.tmp
          include-hidden-files: true
          # Max retention time is 90 days for public repos
          # https://docs.github.com/en/actions/learn-github-actions/usage-limits-billing-and-administration#artifact-and-log-retention-policy
          retention-days: 90

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download devchain artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: package

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish @celo/devchain-anvil
        run: |
          cat package.json
          npm publish $RELEASE_TYPE $DRY_RUN --access public
        working-directory: package
        env:

          RELEASE_TYPE: --tag ${{ needs.build.outputs.release_type != '' && needs.build.outputs.release_type || 'canary' }}
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
          DRY_RUN: ${{ needs.build.outputs.release_version == '' && '--dry-run' || '' }}