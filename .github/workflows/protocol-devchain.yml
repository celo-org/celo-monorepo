name: 'CoreContracts: Devchain For Contract Release'
run-name: 'CoreContracts: Devchain For Contract Release'

on:
  schedule:
    # monthly on 1 at 0:00 UTC
    - cron: 0 0 1 * *
  workflow_dispatch:
permissions:
  contents: read

jobs:
  generate-protocol-devchain:
    name: Generate protocol devchain used in celo-monorepo.yml workflow
    runs-on: ['self-hosted', 'monorepo-node18']
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: core-contracts.v17
            node-version: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 0
          submodules: recursive
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install Foundry
        # foundry-toolchain v1.7.0 https://github.com/foundry-rs/foundry-toolchain/releases/tag/v1.7.0
        uses: foundry-rs/foundry-toolchain@8f1998e9878d786675189ef566a2e4bf24869773
        with:
          # TODO: Standardize Foundry version across workflows https://github.com/celo-org/celo-monorepo/issues/11714
          version: 'v1.5.0'
      - name: Install forge dependencies
        run: forge install
        working-directory: packages/protocol
      # Workaround for https://stackoverflow.com/questions/72978485/git-submodule-update-failed-with-fatal-detected-dubious-ownership-in-repositor
      # This is needed because some runners messup with permissions of git files and submodules. Particularly problematic for DinD runners (e.g. self-hosted+container arg)
      - name: Configure git safe directories
        run: git config --global --add safe.directory '*'
      - name: Install packages
        run: yarn
        working-directory: packages/protocol
      # As of the L2 migration (core-contracts.v17) the devchain is built from the
      # contracts-bedrock initial state and then migrated, mirroring protocol-devchain-anvil.yml.
      - name: Checkout Optimism repo
        uses: actions/checkout@v4
        with:
          repository: 'celo-org/optimism'
          ref: 'celo/core-contracts-base'
          path: celo-optimism
          submodules: recursive
      - name: Generate initial state for devchain
        run: yarn devchain:generate-initial-state --contracts-dir ${{ github.workspace }}/celo-optimism/packages/contracts-bedrock
        working-directory: packages/protocol
      - name: Install celocli
        run: |
          sudo npm install -g @celo/celocli@latest --unsafe-perm
          celocli --version
      - name: Generate devchain of previous release
        run: |
          LOAD_STATE=${{ github.workspace }}/celo-optimism/packages/contracts-bedrock/anvil-state.json yarn anvil-devchain:start
          # anvil-devchain:start loads the bedrock base and applies migrations but, in
          # LOAD_STATE mode, start_anvil.sh does not pass --dump-state, so the post-migration
          # state is never written. Dump the still-running anvil over RPC and decompress it
          # into the plain-JSON file that release-on-devchain.sh loads via --load-state.
          source ./scripts/foundry/constants.sh
          echo "Dumping migrated anvil state from $ANVIL_RPC_URL to .tmp/devchain/$L2_DEVCHAIN_FILE_NAME"
          cast rpc --rpc-url "$ANVIL_RPC_URL" anvil_dumpState \
            | tr -d '"' | sed 's/^0x//' | xxd -r -p | gunzip > ".tmp/devchain/$L2_DEVCHAIN_FILE_NAME"
        working-directory: packages/protocol
      - name: List generated devchain files
        run: ls -la packages/protocol/.tmp packages/protocol/.tmp/devchain || true
      - name: Upload devchain as artifact
        uses: actions/upload-artifact@v4
        with:
          name: devchain-${{ matrix.tag }}
          path: packages/protocol/.tmp/devchain
          include-hidden-files: true
          # Max retention time is 90 days for public repos
          # https://docs.github.com/en/actions/learn-github-actions/usage-limits-billing-and-administration#artifact-and-log-retention-policy
          retention-days: 90
