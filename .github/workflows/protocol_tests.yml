name: Protocol Foundry tests
on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'

env:
  # Supported Foundry version defined at celo-org (GitHub organisation) level, for consistency across workflows. Please contact DevOps to update value.
  SUPPORTED_FOUNDRY_VERSION: ${{ vars.SUPPORTED_FOUNDRY_VERSION }}

permissions:
  contents: read

jobs:
  lint-checks:
    defaults:
      run:
        working-directory: packages/protocol
    name: Run tests
    runs-on: ['self-hosted', 'org', 'ubuntu22-node18']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Fail if there are test with wrong extension
        run: |
          if  tree test-sol | grep -i ".sol" | grep -v ".sol"; then
            echo "There are tests with wrong extensions"
            tree test-sol | grep -i ".sol" | grep -v ".sol"
            exit 1
          fi
      - name: Fail if there are tests without folder
        run: |
          if ls test-sol | grep -qi '\.t\.sol'; then
            echo "All tests should be in a folder"
            exit 1
          fi

  compile:
    defaults:
      run:
        working-directory: packages/protocol
    name: Compile contracts
    runs-on: ubuntu-latest
    steps:
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@0404882bc4666c0ff2f6fd8b3d32af69a730183c
        with:
          swap-size-gb: 32
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Fail if there are test with wrong extension
        if: success() || failure()
        run: |
          if  tree test-sol | grep -i ".sol" | grep -v ".sol"; then
            echo "There are tests with wrong extensions"
            tree test-sol | grep -i ".sol" | grep -v ".sol"
            exit 1
          fi
      - name: Foundry cache
        id: foundry-cache
        uses: actions/cache@v4
        with:
          path: packages/protocol/cache
          key: ${{ runner.os }}-foundry-cache-${{ env.FOUNDRY_CACHE_KEY }}
      - name: Foundry out
        id: foundry-out
        uses: actions/cache@v4
        with:
          path: packages/protocol/out
          key: ${{ runner.os }}-foundry-out-${{ env.FOUNDRY_CACHE_KEY }}
      - name: Install Foundry
        # foundry-toolchain v1.7.0 https://github.com/foundry-rs/foundry-toolchain/releases/tag/v1.7.0
        uses: foundry-rs/foundry-toolchain@8f1998e9878d786675189ef566a2e4bf24869773
        with:
          # TODO: Standardize Foundry version across workflows https://github.com/celo-org/celo-monorepo/issues/11714
          version: 'v1.5.0'

      - name: Install forge dependencies
        run: forge install
      - name: Compile Contracts
        run: forge --version && forge compile
      # Upload the full workspace (source + compiled artifacts) so child jobs
      # skip both git clone and recompilation.
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: protocol-workspace
          path: packages/protocol
          retention-days: 1

  unit-tests:
    needs: compile
    defaults:
      run:
        working-directory: packages/protocol
    name: Unit tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: common
            path: "test-sol/unit/common/*"
          - name: governance/network
            path: "test-sol/unit/governance/network/*"
            block_gas_limit: 50000000
          - name: governance/validators
            path: "test-sol/unit/governance/validators/*"
            block_gas_limit: 50000000
          - name: governance/voting
            path: "test-sol/unit/governance/voting/*"
          - name: stability
            path: "test-sol/unit/stability/*"
            block_gas_limit: 50000000
          - name: identity
            path: "test-sol/unit/identity/*"
            block_gas_limit: 50000000
          - name: all (catch-all)
            path: "test-sol/unit/*"
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: protocol-workspace
          path: packages/protocol
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: 'v1.0.0'
      - name: Run tests
        run: |
          forge test -vvv \
          --match-path "${{ matrix.path }}" \
          ${{ matrix.block_gas_limit && format('--block-gas-limit {0}', matrix.block_gas_limit) || '' }}

  integration-tests:
    needs: compile
    defaults:
      run:
        working-directory: packages/protocol
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: protocol-workspace
          path: packages/protocol
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: 'v1.0.0'
      - name: Run integration tests
        run: |
          forge test -vvv \
          --match-path "test-sol/integration/*"

  devchain-tests:
    needs: compile
    defaults:
      run:
        working-directory: packages/protocol
    name: Devchain tests
    runs-on: ubuntu-latest
    steps:
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@0404882bc4666c0ff2f6fd8b3d32af69a730183c
        with:
          swap-size-gb: 32
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: protocol-workspace
          path: packages/protocol
      - name: Install Foundry
        # foundry-toolchain v1.7.0 https://github.com/foundry-rs/foundry-toolchain/releases/tag/v1.7.0
        uses: foundry-rs/foundry-toolchain@8f1998e9878d786675189ef566a2e4bf24869773
        with:
          version: 'v1.5.0'
      - name: Restore script permissions
        run: chmod +x scripts/foundry/*.sh scripts/bash/*.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Setup yarn
        run: npm install --global yarn
      - name: Install packages
        run: yarn
        working-directory: ${{ github.workspace }}
      - name: Checkout Optimism repo
        uses: actions/checkout@v4
        with:
          repository: 'celo-org/optimism'
          ref: 'celo/core-contracts-base'
          path: celo-optimism
          submodules: recursive
      - name: Generate initial state for devchain
        run: yarn devchain:generate-initial-state --contracts-dir ${{ github.workspace }}/celo-optimism/packages/contracts-bedrock
      - name: Install celocli
        run: sudo npm install -g @celo/celocli@latest --unsafe-perm
      - name: Generate migrations and run devchain
        run: |
          LOAD_STATE=${{ github.workspace }}/celo-optimism/packages/contracts-bedrock/anvil-state.json ./scripts/foundry/create_and_migrate_anvil_devchain.sh
      - name: Run migration tests against local anvil devchain
        run: |
          source ./scripts/foundry/constants.sh

          FOUNDRY_PROFILE=devchain forge test -vvv \
          --match-path "test-sol/devchain/migration/*" \
          --fork-url $ANVIL_RPC_URL
      - name: Run e2e tests against local anvil devchain
        run: |
          source ./scripts/foundry/constants.sh

          FOUNDRY_PROFILE=devchain forge test -vvv \
          --match-path "test-sol/devchain/e2e/*" \
          --fork-url $ANVIL_RPC_URL
