name: Publish ABIs and Solidity files to NPM

on:
  push:
    tags:
      - core-contracts.v*
    # If you define both branches/branches-ignore and paths/paths-ignore, the workflow will only run when both filters are satisfied.
    branches: [release/core-contracts/*]
    paths:
      - 'packages/protocol/abis/**'
      - 'packages/protocol/contracts/**'
      - 'packages/protocol/contracts-0.8/**'
      - 'packages/protocol/lib/**'
      - 'packages/protocol/scripts/**'
      - '!packages/protocol/scripts/foundry/**'
      - '!packages/protocol/scripts/truffle/**'

  # pull requests result in dry runs, since no git tag is present unless current branch folllows release branch pattern
  pull_request:
    branches: [release/core-contracts/*, master]
    paths:
      - 'packages/protocol/abis/**'
      - 'packages/protocol/contracts/**'
      - 'packages/protocol/contracts-0.8/**'
      - 'packages/protocol/lib/**'
      - 'packages/protocol/scripts/**'
      - '!packages/protocol/scripts/foundry/**'
     
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'NPM TAG e.g. alpha, pre-merge (default: canary) '
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    # github-hosted runner required: npm OIDC trusted publishing auto-enables
    # sigstore provenance, which is only supported on github-hosted runners.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      repository-projects: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # Publishing uses npm OIDC trusted publishing (configured on npmjs for
      # @celo/contracts and @celo/abis -> celo-org/celo-monorepo /
      # publish-contracts-abi-release.yml), so no long-lived npm token is required.
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: 'Setup yarn'
        shell: bash
        run: |
          npm install --global yarn
          source ~/.bashrc

      - name: 'Install packages'
        shell: bash
        run: yarn

      - name: Install Foundry
        # foundry-toolchain v1.7.0 https://github.com/foundry-rs/foundry-toolchain/releases/tag/v1.7.0
        uses: foundry-rs/foundry-toolchain@8f1998e9878d786675189ef566a2e4bf24869773
        with:
          # TODO: Standardize Foundry version across workflows https://github.com/celo-org/celo-monorepo/issues/11714
          version: 'v1.0.0'
      - name: Install forge dependencies
        working-directory: packages/protocol
        run: forge install

      - name: Determine release type and version (or dry run)
        # This is what sets the RELEASE_TYPE and RELEASE_VERSION env variables
        run: yarn --silent release:determine-release-version >> "$GITHUB_ENV"
        working-directory: packages/protocol
        env:
          GITHUB_TAG: ${{ github.ref_name }}
          NPM_PACKAGE: "@celo/contracts"
          NPM_TAG: ${{ inputs.npm_tag }}
      - name: 'Build packages'
        shell: bash
        run:  yarn build --include-dependencies
      - name: Compile solidity contracts and typescript files
        run: yarn utils:prepare-contracts-and-abis-publishing
        working-directory: packages/protocol
        env:
          RELEASE_TYPE: ${{ env.RELEASE_TYPE }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        # a safety check especially useful if some package is upgraded
      - name: 'Validate ABIS Exports'
        shell: bash
        run: yarn utils:validate-abis-exports
        working-directory: packages/protocol
      - name: 'Get git commit hash'
        id: get_COMMIT_HASH
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Publish @celo/contracts
        run: |
          cat package.json
          npm publish $RELEASE_TYPE $DRY_RUN --access public
          echo 'tagging version' $RELEASE_VERSION 'with commit hash' $COMMIT_HASH
          if [ -n "$DRY_RUN" ]; then
            echo "Dry run mode, exiting successfully."
            exit 0
          fi
          # OIDC trusted publishing authorizes `npm publish`; the dist-tag write may
          # not be covered, so don't fail the release if the commit-hash tag can't be set.
          npm dist-tag add @celo/contracts@$RELEASE_VERSION $COMMIT_HASH || echo "::warning::npm dist-tag add failed; $RELEASE_VERSION published but commit-hash tag not set"
        working-directory: packages/protocol/contracts-package-abi
        env:
          RELEASE_TYPE: --tag ${{ env.RELEASE_TYPE != '' && env.RELEASE_TYPE || 'canary' }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          DRY_RUN: ${{ env.RELEASE_VERSION == '' && '--dry-run' || '' }}
          COMMIT_HASH: ${{ env.COMMIT_HASH }}

      - name: Publish @celo/abis
        run: |
          cat package.json
          npm publish $RELEASE_TYPE $DRY_RUN --access public
          echo 'tagging version' $RELEASE_VERSION 'with commit hash' $COMMIT_HASH
          if [ -n "$DRY_RUN" ]; then
            echo "Dry run mode, exiting successfully."
            exit 0
          fi
          # OIDC trusted publishing authorizes `npm publish`; the dist-tag write may
          # not be covered, so don't fail the release if the commit-hash tag can't be set.
          npm dist-tag add @celo/abis@$RELEASE_VERSION $COMMIT_HASH || echo "::warning::npm dist-tag add failed; $RELEASE_VERSION published but commit-hash tag not set"
        working-directory: packages/protocol/abis
        env:
          RELEASE_TYPE: --tag ${{ env.RELEASE_TYPE != '' && env.RELEASE_TYPE || 'canary' }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          DRY_RUN: ${{ env.RELEASE_VERSION == '' && '--dry-run' || '' }}
          COMMIT_HASH: ${{ env.COMMIT_HASH }}
